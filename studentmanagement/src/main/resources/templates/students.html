<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Students List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            min-height:100vh;
            font-family:Arial;
        }

        .glass{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            border-radius:18px;
            color:white;
            padding:20px;
        }

        .navbar{
            background: rgba(0,0,0,0.35);
        }

        .table{
            color:white;
        }

        .table thead{
            background: rgba(0,0,0,0.5);
        }

        .table tbody tr:hover{
            background: rgba(255,255,255,0.1);
        }

        .avatar{
            width:35px;
            height:35px;
            border-radius:50%;
            background:#0d6efd;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-weight:bold;
            margin-right:8px;
        }

        .search-box{
            max-width:300px;
        }

        .btn{
            border-radius:10px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-3">
        <i class="bi bi-mortarboard-fill"></i> UPGRADE IT CLASSES
    </span>

    <div class="ms-auto">
        <a href="/dashboard" class="btn btn-light btn-sm">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
</nav>

<div class="container mt-4">
	


    <!-- Title -->
    <div class="text-center text-white mb-4">
        <h1 class="fw-bold">All Students</h1>
        <p>Manage and view student records</p>
    </div>

    <!-- Table Section -->
    <div class="glass">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-table"></i> Student Records</h4>
			<form action="/students" method="get" class="d-flex">

			       <input type="text"
			              name="keyword"
			              th:value="${keyword}"
			              class="form-control search-box"
			              placeholder="Search by name / course / email">

			       <button type="submit" class="btn btn-primary ms-2">
			           <i class="bi bi-search"></i>
			       </button>

			       <!-- Optional Reset -->
			       <a href="/students" class="btn btn-secondary ms-2">
			           Reset
			       </a>

			   </form>
        </div>
		<h1 class="fw-bold text-center text-white mb-4">All Students</h1>

        <table class="table table-bordered text-center align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

            <tr th:each="student : ${students}">
				
				<h2 class="text-center text-white mb-4">
				     <span th:text="${courseName} ?: ' '"></span>
				</h2>
				
                <td th:text="${student.id}"></td>

                <td>
                    <span class="avatar"
                          th:text="${#strings.substring(student.name,0,1)}"></span>
                    <span th:text="${student.name}"></span>
                </td>

                <td th:text="${student.course}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.mobileNo}"></td>

                <td>
                    <a th:href="@{/deleteStudent/{id}(id=${student.id})}"
                       class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
