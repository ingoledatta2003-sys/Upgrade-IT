<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Premium Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            min-height:100vh;
            font-family:Arial;
        }

        .glass{
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(14px);
            border-radius:18px;
            color:white;
            padding:15px;
        }

        .navbar{
            background: rgba(0,0,0,0.35);
        }

        .stat-card{
            padding:20px;
            text-align:center;
            transition:0.3s;
            cursor:pointer;
            height:100%;
        }

        .stat-card:hover{
            transform:translateY(-6px);
        }

        .big{
            font-size:30px;
            font-weight:700;
        }

        .form-control{
            border-radius:10px;
        }

        .btn{
            border-radius:10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-3">
        <i class="bi bi-mortarboard-fill"></i> UPGRADE IT CLASSES
    </span>

    <div class="ms-auto">
        <form action="/logout" method="post">
            <button class="btn btn-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </form>
    </div>
</nav>


<div class="container mt-4">
	

    <!-- TITLE -->
    <div class="text-center text-white mb-4">
        <h1 class="fw-bold">Student Dashboard</h1>
    </div>

    <!-- STATS ROW -->
    <div class="row g-3 mb-4">

        <!-- Total Students -->
        <div class="col-md-3">
            <a th:href="@{/students}" style="text-decoration:none; color:white;">
                <div class="glass stat-card">
                    <i class="bi bi-people-fill fs-1"></i>
                    <div class="big" th:text="${totalStudents}"></div>
                    <div>Total Students</div>
                </div>
            </a>
        </div>

		<!-- Registered Students -->
		<div class="col-md-3">
		    <a th:href="@{/registered-students}" style="text-decoration:none; color:white;">
		        <div class="glass stat-card">
		            <i class="bi bi-person-check-fill fs-1"></i>
		            <div class="big" th:text="${registeredCount}"></div>
		            <div>Registered Students</div>
		        </div>
		    </a>
		</div>

        <!-- Courses -->
        <div class="col-md-3">
            <a th:href="@{/courses}" style="text-decoration:none; color:white;">
                <div class="glass stat-card">
                    <i class="bi bi-book-fill fs-1"></i>
                    <div class="big">12</div>
                    <div>Courses</div>
                </div>
            </a>
        </div>

        <!-- Course Schedule -->
        <div class="col-md-3">
            <a th:href="@{/course-schedule}" style="text-decoration:none; color:white;">
                <div class="glass stat-card">
                    <i class="bi bi-calendar-event-fill fs-1"></i>
                    <div class="big">12</div>
                    <div>Course Schedule</div>
                </div>
            </a>
        </div>

    </div>

    <!-- ADD STUDENT FORM -->
    <div class="glass p-4 mb-4">
        <h4><i class="bi bi-person-plus-fill"></i> Add Student</h4>

        <form action="/saveStudent" method="post">

            <div class="mb-3">
                <input type="number" name="id" placeholder="Enter ID" class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="text" name="name" placeholder="Enter Name" class="form-control" required>
            </div>

            <div class="mb-3">
                <select name="course" class="form-control" required>
                    <option value="">Select Course</option>
                    <option>Java Full Stack</option>
                    <option>Python</option>
                    <option>C Programming</option>
                    <option>C++</option>
                    <option>Data Science</option>
                    <option>Data Analytics</option>
                    <option>Database Management</option>
                    <option>Cloud Computing</option>
                    <option>DevOps</option>
                    <option>Web Development</option>
                    <option>Artificial Intelligence</option>
                    <option>Machine Learning</option>
                </select>
            </div>

            <div class="mb-3">
                <input type="email" name="email" placeholder="Enter Email" class="form-control" required>
            </div>

            <div class="mb-3">
                <input type="text" name="mobileNo" placeholder="Enter Mobile Number" class="form-control">
            </div>

            <button class="btn btn-success w-100">
                <i class="bi bi-plus-circle"></i> Add Student
            </button>
			
			
			

        </form>
    </div>

</div>

</body>
</html>
