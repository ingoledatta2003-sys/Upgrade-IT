<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        
        <h3 class="text-center mb-4">Create Account</h3>

        <form action="/register" method="post" th:object="${user}">
            
            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" th:field="*{username}" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" th:field="*{password}" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <!-- Success Message -->
        <p class="text-success text-center mt-3" th:text="${msg}"></p>

        <hr>

        <div class="text-center">
            <a href="/login">Already have an account? Login</a>
        </div>

    </div>
</div>

</body>
</html>
