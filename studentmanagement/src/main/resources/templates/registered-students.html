<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Registration</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .glass {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.2);
            border: none;
            color: black;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.3);
            box-shadow: none;
            color: white;
        }

        .form-select option {
            color: black;
            background: white;
        }

        table {
            color: white;
        }

        .container {
            max-width: 1000px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2><i class="bi bi-person-plus"></i> Student Registration</h2>
    </div>

    <!-- FORM -->
    <div class="glass p-4 mb-4">

        <h4>Register Student</h4>

        <form action="/saveRegisteredStudent" method="post">

            <input type="number" name="id" class="form-control mb-3" placeholder="Student ID" required>

            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

            <select name="course" class="form-select mb-3" required>
                <option value="">Select Course</option>
                <option>Java Full Stack</option>
                <option>Python</option>
                <option>C Programming</option>
                <option>C++</option>
                <option>Data Science</option>
                <option>Data Analytics</option>
                <option>Database Management</option>
                <option>Cloud Computing</option>
                <option>DevOps</option>
                <option>Web Development</option>
                <option>Artificial Intelligence</option>
                <option>Machine Learning</option>
            </select>

            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

            <input type="text" name="mobileNo" class="form-control mb-3" placeholder="Mobile Number" required>

            <button class="btn btn-primary w-100">
                <i class="bi bi-save"></i> Register Student
            </button>

        </form>

    </div>

    <!-- REGISTERED STUDENTS LIST -->
    <div class="glass p-4">

        <h4><i class="bi bi-person-check"></i> Registered Students</h4>

        <table class="table table-dark table-hover mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>
                    <th>Email</th>
                    <th>Mobile</th>
                    <th>Status</th>
                    <th>Action</th> <!-- ✅ Added -->
                </tr>
            </thead>

            <tbody>
                <tr th:each="s : ${registeredStudents}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.name}"></td>
                    <td th:text="${s.course}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.mobileNo}"></td>
                    <td>
                        <span class="badge bg-success">Registered</span>
                    </td>

                    <!-- ✅ UNREGISTER BUTTON -->
                    <td>
                        <a th:href="@{'/unregisterStudent/' + ${s.id}}"
                           class="btn btn-warning btn-sm"
                           onclick="return confirm('Unregister this student?')">
                            <i class="bi bi-arrow-counterclockwise"></i> Unregister
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

    <!-- BACK -->
    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-light">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

</div>

</body>
</html>
