<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            color:white;
            font-family:Arial;
        }

        .glass{
            background: rgba(255,255,255,0.12);
            padding:20px;
            border-radius:15px;
            margin:10px;
            text-align:center;
            transition:0.3s;
        }

        .glass:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">IT Courses</h2>

    <div class="row">

        <div class="col-md-3" th:each="course : ${courses}">
            <div class="glass">
				<a th:href="@{/courses/{name}(name=${course})}" 
				   style="text-decoration:none; color:white;">
				    <div class="glass">
				        <h5 th:text="${course}"></h5>
				    </div>
				</a>
            </div>
        </div>

    </div>

    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-light">Back</a>
    </div>

</div>

</body>
</html>
